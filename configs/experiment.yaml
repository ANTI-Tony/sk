#
# 80-rollout sanity check: 20 queries x 4 bundles (gos_original, delete_top,
# add_irrelevant, replace_similar). Goal is to judge Case A vs Case B before
# investing in surrogate modeling.
#
# Setup once on the host (not inside any task container):
#   git clone https://github.com/davidliuk/graph-of-skills ../graph-of-skills
#   cd ../graph-of-skills && uv sync && ./scripts/download_data.sh
#   uv tool install harbor                # SkillsBench task runner; needs Docker
#

paths:
  gos_repo: ../graph-of-skills
  skills_library: ../graph-of-skills/data/skillsets/skills_200
  gos_workspace: ../graph-of-skills/data/gos_workspace/skills_200_v1
  skillsbench_tasks: ../graph-of-skills/evaluation/skillsbench/tasks
  results_dir: /tmp/gos-sanity-results    # outside any iCloud-synced dir; survives across reruns

retrieval:
  top_n: 8                              # default GoS bundle size
  max_context_chars: 32000              # production budget; affects bundle truncation only

agent:
  backend: anthropic                    # one of: openai, anthropic, gemini
  model: claude-sonnet-4-5              # matches paper Table 1 directly
  timeout_s: 1800                       # subprocess wall-clock timeout (our wrapper)
  harbor_timeout_multiplier: 5          # multiplies harbors per-phase timeouts (default 1)
                                        # 5x = ~15min agent, ~10min setup; raise if pptx-style tasks still cancel

queries:
  selection_seed: 20260425
  count: 20

perturbations:
  add_irrelevant_cosine_max: 0.20       # candidate must have cosine(query, skill) below this
  replace_similar_rho_epsilon: 0.001    # PPR scores normalize to sum=1; epsilon is on that scale
