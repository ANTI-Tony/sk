#
# Tunable experiment parameters. Distinct from preregistration.yaml: anything
# affecting the decision rule lives there; anything affecting only how runs
# are executed lives here.
#
# One-time setup (do this in the GoS clone, not in this repo):
#   git clone https://github.com/davidliuk/graph-of-skills ../graph-of-skills
#   cd ../graph-of-skills
#   uv sync
#   ./scripts/download_data.sh                  # skill libraries + tasks + prebuilt workspace
#   uv tool install harbor                       # SkillsBench task runner
#   # Docker (or OrbStack) must be running before any agent invocation.
#

paths:
  gos_repo: ../graph-of-skills
  skills_library: ../graph-of-skills/data/skillsets/skills_200
  gos_workspace: ../graph-of-skills/data/gos_workspace/skills_200_v1
  skillsbench_tasks: ../graph-of-skills/evaluation/skillsbench/tasks
  results_dir: ./results

retrieval:
  # Hyperparameters held fixed across the experiment so any reward delta is
  # attributable to bundle composition, not retrieval-time settings. The
  # SkillGraphRAG.Config defaults are used for everything not listed here;
  # the values below are the levers we actively touch.
  top_n: 8                                # default bundle size; matches SkillsBench gos template defaults
  context_budget_tokens: 8000             # tau in eq 1; smaller value forces retrieval to bind on N=200

agent:
  backend: openai                         # one of: openai, anthropic, gemini -> Harbor agent name
  model: openai/gpt-5.2-codex             # primary per preregistration
  temperature: 0.0                        # remove decoding noise; sigma_within isolates non-decoding stochasticity
  max_tokens: 4096
  timeout_s: 1800                         # SkillsBench tasks include container boot + agent loop
  retries_on_infra_failure: 2

queries:
  selection_seed: 20260424
  count: 20
  source: skillsbench
  stratify_by: heuristic_keyword          # see scripts/select_queries.py::_infer_stratum

perturbations:
  unrelated_swap:
    cosine_max: 0.25                      # candidate must have cosine(query, skill) below this
    require_different_domain_tag: true
    n_swaps_per_bundle: 1
  epsilon_neighbor_swap:
    rho_epsilon: 0.001                    # PPR scores are normalized to sum=1; epsilon is on that scale
    must_be_outside_topk: true
    n_swaps_per_bundle: 1
  leave_one_out:
    drop_each: true                       # drop every skill in turn; |B| runs per query

logging:
  per_run_json: true
  flush_every_run: true
