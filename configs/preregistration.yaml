#
# Pre-registered decision rule for GoS bundle-sensitivity sanity check.
# Frozen BEFORE any experiment run. Changes require explicit log entry below.
#

study_id: gos-sensitivity-v1
date_registered: 2026-04-24
hypothesis: >
  Reward on SkillsBench is sensitive to bundle composition. If three
  perturbation types (leave-one-out drop, unrelated-swap, epsilon-neighbor
  swap) all produce mean reward deltas below delta_threshold relative to the
  default GoS bundle, we conclude that surrogate modeling of bundle utility
  has no learnable signal and terminate the project.

primary_metric: mean_reward_delta            # |mean(R_perturbed) - mean(R_default)|
primary_benchmark: SkillsBench                # continuous-valued reward, not ALFWorld
primary_agent: gpt-5.2-codex                  # matches GoS paper Table 1

# Decision thresholds. Anchored to the GoS vs Vector Skills gap of 6-10 points
# reported in Table 1 of the paper (arXiv:2604.05333v2). Absolute scale, SkillsBench is reported as %.
delta_threshold: 0.05                         # effect size required to claim sensitivity
variance_ratio_required: 2.0                  # effect must exceed 2 * sigma_within

decision_rule: |
  IF mean(|R_perturbed - R_default|) >= delta_threshold
     AND mean(|R_perturbed - R_default|) >= variance_ratio_required * sigma_within
     for AT LEAST ONE of the three perturbation types
  THEN: bundle composition carries learnable signal; proceed to surrogate design.

  ELSE IF none of the three perturbations clears both thresholds:
  THEN: terminate surrogate modeling line of work on this benchmark.

  ELSE IF exactly one perturbation clears thresholds:
  THEN: write up as partial-signal finding; narrow surrogate scope to that
        perturbation type before any expansion.

floor_effect_control:
  # GoS at N=200 is ~tied with Vanilla (32.1 vs 32.5 in Table 2 of paper).
  # A null result at N=200 could reflect "retrieval doesnt matter at this scale"
  # rather than "bundle composition doesnt matter." Mitigations:
  primary_library_size: 200
  context_budget_tau: null                    # set to a value that forces retrieval; see notes
  control_library_size: 1000                  # rerun 5 queries at this size as a cross-check

sample_size:
  queries: 20
  repeats_default: 3                          # K for variance baseline; can raise to 5 if budget allows
  repeats_perturbation: 3

amendments_log: []                             # any change to this file must be appended here with date + reason
